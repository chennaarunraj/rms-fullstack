<div class="p-10 bg-gray-100 min-h-screen">

  <h1 class="text-4xl font-bold text-center mb-8">
    Our Menu
  </h1>

  <!-- Category Filters -->

  <div class="flex flex-wrap justify-center gap-4 mb-10">

    <button
      *ngFor="let cat of categories"
      (click)="filterCategory(cat)"
      class="px-5 py-2 rounded-full border
      hover:bg-black hover:text-white transition"
      [class.bg-black]="selectedCategory===cat"
      [class.text-white]="selectedCategory===cat"
    >
      {{cat}}
    </button>

  </div>


  <!-- Menu Grid -->

  <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-8">

    <div
      *ngFor="let item of filteredItems"
      class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-2xl transition duration-300 transform hover:-translate-y-1"
    >

      <img
        [src]="item.image"
        class="w-full h-48 object-cover"
      />

      <div class="p-5">

        <h2 class="text-xl font-semibold mb-2">
          {{ item.name }}
        </h2>

        <p class="text-gray-500 text-sm mb-3">
          {{ item.category }}
        </p>

        <div class="flex justify-between items-center">

          <span class="text-lg font-bold text-green-600">
            ₹{{ item.price }}
          </span>

         <button
           (click)="addToCart(item)"
           class="bg-black text-white px-4 py-2 rounded-lg hover:bg-gray-800 transition">
            Add
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
