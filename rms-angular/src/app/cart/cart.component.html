<div class="p-10 bg-gray-100 min-h-screen">

<h1 class="text-3xl font-bold mb-8">
Your Cart
</h1>

<div *ngIf="cartItems.length===0" class="text-gray-500">
Cart is empty
</div>

<div *ngFor="let item of cartItems"
 class="bg-white p-4 mb-4 rounded shadow flex items-center justify-between">

  <!-- Item Info -->
  <div class="w-1/3">
    <div class="font-semibold text-lg">
      {{item.name}}
    </div>

    <div class="text-gray-500">
      ₹{{item.price}}
    </div>
  </div>

  <!-- Quantity Controls -->
  <div class="flex items-center gap-4">

    <button
      (click)="decrease(item)"
      class="bg-gray-200 px-3 py-1 rounded hover:bg-gray-300"
    >
      -
    </button>

    <span class="w-6 text-center">
      {{item.quantity}}
    </span>

    <button
      (click)="increase(item)"
      class="bg-gray-200 px-3 py-1 rounded hover:bg-gray-300"
    >
      +
    </button>

  </div>

  <!-- Price -->
  <div class="w-20 text-right font-bold">
    ₹{{item.price * item.quantity}}
  </div>

  <!-- Remove Button -->
  <button
    (click)="remove(item)"
    class="text-red-500 text-xl hover:text-red-700">
    remove
  </button>

</div>

<div class="text-xl font-bold mt-6">
Total: ₹{{total}}
</div>

<button
 (click)="placeOrder()"
 class="mt-6 bg-green-600 text-white px-6 py-3 rounded hover:bg-green-700"
>
 Place Order
</button>

</div>
